<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Aluno - Fit Control</title>
  <link rel="stylesheet" href="./css/dashboard.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <h2>Fit Control</h2>
      <button class="close-btn" id="closeMenu">
        <i class='bx bx-x'></i>
      </button>
    </div>

    <nav>
      <a href="aluno-dashboard.html" class="active-link"><i class='bx bxs-dashboard'></i> Início</a>
      <a href="meus-treinos.html"><i class='bx bxs-dumbbell'></i> Meus Treinos</a>
      <a href="minhas-aulas.html"><i class='bx bxs-time'></i> Minhas Aulas</a>
      <a href="meu-plano.html"><i class='bx bxs-wallet'></i> Meu Plano</a>
      <a href="presenca-aluno.html"><i class='bx bxs-calendar'></i> Minha Frequência</a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <button class="menu-btn" id="openMenu">
          <i class='bx bx-menu'></i>
        </button>
        <h1>Área do Aluno</h1>
      </div>

      <div class="user" id="userMenu">
        <i class='bx bxs-user-circle'></i>
        <span id="nomeUsuario">Aluno</span>
        <i class='bx bx-chevron-down'></i>

        <div class="dropdown" id="dropdownMenu">
          <button id="trocarUsuario">Trocar usuário</button>
          <button id="logout">Sair</button>
        </div>
      </div>
    </header>

    <section class="cards">
      <div class="card">
        <i class='bx bxs-user'></i>
        <div>
          <h3>Plano Atual</h3>
          <p id="planoAluno">Mensal</p>
        </div>
      </div>

      <div class="card">
        <i class='bx bxs-calendar'></i>
        <div>
          <h3>Próximo Vencimento</h3>
          <p>25/03/2026</p>
        </div>
      </div>

      <div class="card">
        <i class='bx bxs-check-circle'></i>
        <div>
          <h3>Frequência</h3>
          <p>82%</p>
        </div>
      </div>

      <div class="card">
        <i class='bx bxs-hot'></i>
        <div>
          <h3>Próxima Aula</h3>
          <p>Funcional - 18h</p>
        </div>
      </div>
    </section>

    <section class="table-section">
      <h2>Meus Dados</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Usuário</th>
              <th>Tipo</th>
            </tr>
          </thead>
          <tbody id="dadosAluno">
            <tr>
              <td colspan="4">Nenhum dado encontrado.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

  <script src="./js/aluno-dashboard.js"></script>
  <script src="./js/user.js"></script>
</body>
</html>
