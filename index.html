<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login FitControl</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    
    <main class="container">   
        <form id="loginForm">
            <h1>Login FitControl</h1>

            <div class="input-box">
                <input placeholder="Usuário" type="text" id="usuario" required>
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha" type="password" id="senha" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit" class="login">Entrar</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="./signup.html">Cadastre-se</a></p>
            </div>
        </form>
    </main>

    <script src="./js/script.js"></script>
</body>
</html>
